<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task Sequence Reporter</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--hover:rgba(255,255,255,0.05)}
    html,body{height:100%;margin:0;font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;color:#e6eef6;background:#071226;overflow:hidden;}
    .wrap{max-width:1800px;margin:0 auto;padding:15px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column}
    
    /* --- HEADER --- */
    header{display:flex;gap:15px;align-items:center;padding-bottom:15px;border-bottom:1px solid var(--border);flex-shrink:0}
    h1{font-size:18px;margin:0;color:var(--accent);font-weight:600}
    .controls{margin-left:auto;display:flex;gap:8px;align-items:center}
    
    button, .file-upload{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:6px 12px;border-radius:6px;color:#cfe7ff;cursor:pointer;font-size:12px;transition:0.2s}
    button:hover{background:rgba(255,255,255,0.1);border-color:var(--accent)}
    label.toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;margin-right:10px}
    input[type=checkbox]{accent-color:var(--accent)}
 
    /* --- LAYOUT --- */
    main{display:grid;grid-template-columns:350px 1fr;gap:20px;flex-grow:1;min-height:0;margin-top:15px}
    
    .panel-left{display:flex;flex-direction:column;border-right:1px solid var(--border);padding-right:10px;min-height:0}
    .search-box{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:#fff;margin-bottom:10px;box-sizing:border-box;flex-shrink:0}
    
    .nav-tree{overflow-y:auto;flex-grow:1;padding-bottom:20px}
    .panel-right{overflow-y:auto;padding-right:5px;scroll-behavior:smooth;position:relative}
 
    /* Scrollbars */
    ::-webkit-scrollbar {width: 8px; height: 8px;}
    ::-webkit-scrollbar-track {background: rgba(0,0,0,0.1);}
    ::-webkit-scrollbar-thumb {background: rgba(255,255,255,0.15); border-radius: 4px;}
    ::-webkit-scrollbar-thumb:hover {background: rgba(255,255,255,0.25);}
 
    /* --- COMMON TREE STYLES --- */
    details.ts-group { margin: 4px 0; }
    
    summary.group-summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 6px 8px; border-radius: 6px;
      font-size: 13px; font-weight: 600; color: #e6eef6;
      display: flex; align-items: center;
      transition: background 0.15s;
    }
    summary.group-summary:hover { background: var(--hover); }
    summary.group-summary::-webkit-details-marker { display: none; }
    
    /* Large Arrow for Groups */
    summary.group-summary::before {
      content: '▶'; display: inline-block; width: 14px;
      margin-right: 6px; font-size: 10px; color: var(--accent);
      transition: transform 0.15s ease; opacity: 0.8;
    }
    details[open] > summary.group-summary::before { transform: rotate(90deg); }
    
    .group-content {
      padding-left: 10px; margin-left: 7px;
      border-left: 1px solid rgba(255,255,255,0.06);
    }
 
    .ts-step {
      padding: 5px 8px; margin: 2px 0; border-radius: 4px;
      font-size: 13px; color: #a0aec0; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ts-step:hover { background: var(--hover); color: #fff; }
    .ts-step.active { background: rgba(96,165,250,0.15); color: var(--accent); font-weight: 500; }
    
    /* --- RIGHT PANEL SPECIFIC --- */
    .panel-right details.ts-group {
      border: 1px solid var(--border); border-radius: 8px;
      background: rgba(255,255,255,0.01); margin-bottom: 15px;
    }
    .panel-right summary.group-summary {
      background: rgba(255,255,255,0.02); border-bottom: 1px solid transparent;
    }
    .panel-right details[open] > summary.group-summary {
      border-bottom-color: var(--border); border-radius: 8px 8px 0 0;
    }
    .panel-right .group-content { border-left: none; padding: 15px; margin: 0; }
 
    .panel-right .ts-step {
      cursor: default;
      background: rgba(255,255,255,0.015); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 12px; padding: 12px;
      display: block;
    }
    .panel-right .ts-step:target { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
 
    .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .step-title { font-weight: 700; color: #e6eef6; font-size: 14px; }
    .step-type { font-size: 10px; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: var(--muted); text-transform: uppercase; }
 
    /* Badges */
    .badges { display:flex; gap:6px; }
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
    .badge-disabled { background: rgba(231,76,60,0.2); color: #ff8a80; border: 1px solid rgba(231,76,60,0.3); }
    .badge-continue { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }
 
    /* Details */
    details.sub-detail { margin-top: 6px; }
    summary.sub-summary {
      font-size: 11px; color: var(--muted); cursor: pointer; user-select: none;
      padding: 4px 6px; background: rgba(255,255,255,0.03); border-radius: 4px;
      display: inline-flex; align-items: center; outline: none; list-style: none;
    }
    summary.sub-summary:hover { color: #fff; background: rgba(255,255,255,0.06); }
    summary.sub-summary::-webkit-details-marker { display: none; }
    summary.sub-summary::before {
      content: '▶'; display: inline-block; width: 12px; margin-right: 4px;
      font-size: 8px; color: var(--muted); transition: transform 0.15s;
    }
    details[open] > summary.sub-summary::before { transform: rotate(90deg); }
 
    .meta-block { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; border-left: 2px solid var(--accent); }
    .meta-row { display: flex; gap: 8px; margin-bottom: 4px; }
    .meta-label { color: var(--muted); min-width: 70px; font-weight: 600; }
    .code-block { margin:0; padding:10px; background:#050c18; border-radius:4px; font-family:Menlo,Consolas,monospace; font-size:11px; color:#a5d6ff; white-space:pre-wrap; word-break:break-all; border:1px solid var(--border); }
 
    .prop-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 5px; }
    .prop-table td { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: top; }
    .prop-key { color: var(--muted); width: 140px; }
    .prop-val { color: #e2e8f0; font-family: Menlo, monospace; }
 
    /* Logic Display */
    .logic-box { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.2); padding: 8px; border-radius: 4px; color: #a0aec0; font-family: Menlo, monospace; font-size: 11px; white-space: pre-wrap; margin-bottom: 5px; }
    .logic-keyword { color: var(--accent); font-weight: bold; }
    .logic-val { color: #2ecc71; }
 
    /* App List */
    .app-list { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin-bottom: 10px; }
    .app-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    .app-item:last-child { border: none; }
    .app-icon { color: var(--success); }
 
    /* States */
    .is-disabled-node { opacity: 0.6; }
    body.hide-disabled-mode .is-disabled-node { display: none !important; }
  </style>
</head>
<body class="hide-disabled-mode">
  <div class="wrap">
    <header>
      <h1>Task Sequence Reporter</h1>
      <label class="toggle">
        <input type="checkbox" id="hideDisabledToggle" checked>
        Hide Disabled Steps
      </label>
      <div class="controls">
        <input id="file" type="file" accept=".xml" style="display:none" />
        <button onclick="document.getElementById('file').click()">📂 Open XML</button>
        <button id="collapseAll">Collapse All</button>
        <button id="expandAll">Expand All</button>
        <button id="copyHtml">Copy HTML</button>
      </div>
    </header>
 
    <main>
      <div class="panel-left">
        <input id="q" class="search-box" placeholder="Filter navigation..." />
        <div id="navTree" class="nav-tree">
          <div style="padding:20px;text-align:center;color:var(--muted)">Select a Task Sequence XML file to begin.</div>
        </div>
      </div>
 
      <div class="panel-right" id="docBody"></div>
    </main>
  </div>
 
<script>
const byId = id => document.getElementById(id);
let globalNodeCounter = 0;
 
// --- UTILITIES ---
function escapeHtml(s) { return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
 
function prettyXml(xml) {
  let formatted = '';
  const nodes = xml.replace(/>\s*</g, '><').match(/<[^>]+>[^<]*|[^<]+/g) || [];
  let pad = 0;
  nodes.forEach(node => {
    let indent = 0;
    if (node.match(/^<\/\w/)) pad = Math.max(0, pad - 1);
    else if (node.match(/^<\w[^>]*[^\/]>.*$/)) indent = 1;
    formatted += '  '.repeat(pad) + node + '\n';
    pad += indent;
  });
  return formatted.trim();
}
 
function isBase64(str) {
  if (!str || str.length < 20) return false;
  if (str.length % 4 !== 0) return false;
  return /^[A-Za-z0-9+\/]+={0,2}$/.test(str.replace(/\s+/g, ""));
}
 
function tryDecodeBase64Text(str) {
  try {
    const binString = atob(str.replace(/\s+/g, ""));
    const bytes = Uint8Array.from(binString, c => c.charCodeAt(0));
    if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
      return new TextDecoder('utf-16le').decode(bytes);
    }
    return new TextDecoder('utf-8').decode(bytes);
  } catch { return str; }
}
 
// --- LOGIC PARSERS ---
 
// Map Condition Operators to Human Readable
const OP_MAP = {
  'equals': '==', 'notEquals': '!=', 'greater': '>', 'less': '<', 'greaterEqual': '>=', 'lessEqual': '<=', 'exists': 'Exists', 'notExists': 'Not Exists'
};
 
function decodeCondition(node, indent = "") {
  let output = "";
  
  if (!node) return "";
 
  // Recursive Processor
  const processExpr = (expr, level) => {
    const type = expr.getAttribute("type") || "";
    let res = "";
    
    // 1. Variable Condition
    if (type === "SMS_TaskSequence_VariableConditionExpression") {
      const v = expr.querySelector("variable[name='Variable']")?.textContent || "?";
      const o = OP_MAP[expr.querySelector("variable[name='Operator']")?.textContent] || "??";
      const val = expr.querySelector("variable[name='Value']")?.textContent || "";
      res = `<span class="logic-keyword">VAR</span> ${escapeHtml(v)} ${o} <span class="logic-val">"${escapeHtml(val)}"</span>`;
    }
    // 2. WMI Condition
    else if (type === "SMS_TaskSequence_WMIConditionExpression") {
      const ns = expr.querySelector("variable[name='Namespace']")?.textContent || "root\\cimv2";
      const q = expr.querySelector("variable[name='Query']")?.textContent || "";
      res = `<span class="logic-keyword">WMI</span> (${escapeHtml(ns)}) <span class="logic-val">"${escapeHtml(q)}"</span>`;
    }
    // 3. Registry Condition
    else if (type === "SMS_TaskSequence_RegistryConditionExpression") {
      const k = expr.querySelector("variable[name='Key']")?.textContent || "";
      const v = expr.querySelector("variable[name='Value']")?.textContent || "(Default)";
      const o = OP_MAP[expr.querySelector("variable[name='Operator']")?.textContent] || "??";
      const d = expr.querySelector("variable[name='Data']")?.textContent || "";
      res = `<span class="logic-keyword">REG</span> ${escapeHtml(k)}\\${escapeHtml(v)} ${o} <span class="logic-val">"${escapeHtml(d)}"</span>`;
    }
    // 4. File/Folder
    else if (type === "SMS_TaskSequence_FolderConditionExpression" || type === "SMS_TaskSequence_FileConditionExpression") {
      const p = expr.querySelector("variable[name='Path']")?.textContent || "";
      res = `<span class="logic-keyword">FILE</span> Exists <span class="logic-val">"${escapeHtml(p)}"</span>`;
    }
    else {
        res = `Unknown Expression (${escapeHtml(type)})`;
    }
    return res;
  };
 
  // Traverse Operators (AND/OR/NOT)
  const ops = node.querySelectorAll(":scope > operator");
  
  if (ops.length === 0) {
      // Direct expressions (unlikely in root but possible)
      const exprs = node.querySelectorAll(":scope > expression");
      exprs.forEach(e => output += indent + processExpr(e) + "\n");
  } else {
      ops.forEach(op => {
          const type = op.getAttribute("type") || "and";
          const opStr = type.toUpperCase();
          const subIndent = indent + "  ";
          
          let children = [];
          
          // Child Expressions
          const exprs = op.querySelectorAll(":scope > expression");
          exprs.forEach(e => children.push(processExpr(e)));
          
          // Child Operators (Nested)
          const subOps = op.querySelectorAll(":scope > operator");
          subOps.forEach(s => {
              // Creating a temporary wrapper to recurse easily
              const wrap = document.createElement("condition");
              wrap.appendChild(s.cloneNode(true));
              children.push("(\n" + decodeCondition(wrap, subIndent + "  ") + subIndent + ")");
          });
 
          if (type === "not") {
             output += indent + `<span class="logic-keyword">NOT</span> (\n` + children.map(c => subIndent + c).join("\n") + `\n${indent})`;
          } else {
             output += indent + children.join(`\n${indent}<span class="logic-keyword">${opStr}</span>\n`);
          }
      });
  }
 
  return output;
}
 
// --- PARSERS ---
function findSequenceXmlFromText(t) {
  const cdata = t.match(/<!\[CDATA\[(.*?)\]\]>/s);
  if (cdata && cdata[1].includes("<sequence")) return cdata[1];
  const seq = t.match(/<sequence[\s\S]*?<\/sequence>/i);
  return seq ? seq[0] : null;
}
 
function parseSequenceXml(x) {
  return new DOMParser().parseFromString(x, "application/xml").querySelector("sequence");
}
 
// --- RENDERING ---
 
function renderNodes(node, container, mode) {
  const children = Array.from(node.children).filter(n => ['group','step','subtasksequence'].includes(n.tagName));
  
  children.forEach(child => {
    if(!child._uid) child._uid = ++globalNodeCounter;
 
    const tagName = child.tagName;
    const name = child.getAttribute("name") || "Unnamed";
    const isDisabled = child.getAttribute("disable") === "true";
    const continueErr = child.getAttribute("continueOnError") === "true";
    const isGroup = tagName === 'group';
 
    // 1. Setup Badges
    let badgeHtml = "";
    if (isDisabled) badgeHtml += `<span class="badge badge-disabled">DISABLED</span>`;
    if (continueErr) badgeHtml += `<span class="badge badge-continue">CONTINUE ON ERROR</span>`;
 
    // 2. Class Names
    let classes = isGroup ? "ts-group" : "ts-step";
    if(isDisabled) classes += " is-disabled-node";
 
    // ---------------------------------------------------------
    // RENDER: GROUP
    // ---------------------------------------------------------
    if (isGroup) {
      const details = document.createElement("details");
      details.className = classes;
      details.open = true; // Default open
      // In Nav mode, ID is needed for search filtering. In Doc mode, ID is anchor target.
      if(mode === 'doc') details.id = "node-" + child._uid;
 
      const summary = document.createElement("summary");
      summary.className = "group-summary";
      
      // LEFT NAV vs DOC Logic
      if (mode === 'nav') {
        // Warning Icon Logic for Left Menu
        let warnIcon = continueErr ? `<span style="margin-left:auto;opacity:0.7">⚠️</span>` : "";
        summary.innerHTML = `${escapeHtml(name)} ${warnIcon}`;
        summary.onclick = (e) => {
          scrollToDoc(child._uid);
        };
      } else {
        // Doc View gets full badges
        summary.innerHTML = `${escapeHtml(name)} <div class="badges" style="margin-left:auto">${badgeHtml}</div>`;
      }
 
      const content = document.createElement("div");
      content.className = "group-content";
 
      // If Doc mode, render Meta data (Description, etc) at top of folder
      if(mode === 'doc') {
        const desc = child.getAttribute("description");
        const cond = child.querySelector("condition");
        let metaHtml = "";
        if(desc) metaHtml += `<div class="meta-row"><span class="meta-label">Desc:</span> <span class="meta-val">${escapeHtml(desc)}</span></div>`;
        if(cond && cond.children.length > 0) {
          const humanLogic = decodeCondition(cond);
          const xmlStr = new XMLSerializer().serializeToString(cond);
          metaHtml += `<div class="meta-row" style="flex-direction:column; align-items:flex-start">
            <span class="meta-label">Condition:</span>
            <div class="logic-box">${humanLogic}</div>
            <details class="sub-detail"><summary class="sub-summary">View Raw XML</summary><pre class="code-block">${escapeHtml(prettyXml(xmlStr))}</pre></details>
          </div>`;
        }
        if(metaHtml) content.innerHTML += `<div class="meta-block">${metaHtml}</div>`;
      }
 
      details.appendChild(summary);
      details.appendChild(content);
      container.appendChild(details);
 
      // Recurse
      renderNodes(child, content, mode);
    }
    // ---------------------------------------------------------
    // RENDER: STEP / SUBTASK
    // ---------------------------------------------------------
    else {
      const div = document.createElement("div");
      div.className = classes;
      
      // NAV MODE: Simple clickable item
      if(mode === 'nav') {
        let warnIcon = continueErr ? '<span style="opacity:0.7;transform:scale(0.8)">⚠️</span>' : '';
        div.innerHTML = `<span>${escapeHtml(name)}</span> ${warnIcon}`;
        div.onclick = () => {
          document.querySelectorAll('.ts-step').forEach(el => el.classList.remove('active'));
          div.classList.add('active');
          scrollToDoc(child._uid);
        };
        container.appendChild(div);
      }
      // DOC MODE: Full Detailed Card
      else {
        div.id = "node-" + child._uid;
        const type = child.getAttribute("type") || tagName;
        const desc = child.getAttribute("description");
        
        // Header
        let html = `
          <div class="step-header">
            <span class="step-title">${escapeHtml(name)} <span class="badges" style="display:inline-flex;vertical-align:middle;margin-left:8px">${badgeHtml}</span></span>
            <span class="step-type">${escapeHtml(type)}</span>
          </div>`;
        
        // Description
        if(desc) html += `<div class="meta-block" style="border-left-color:var(--muted)"><div class="meta-val">${escapeHtml(desc)}</div></div>`;
 
        div.innerHTML = html;
 
        // Conditions
        const cond = child.querySelector("condition");
        if(cond && cond.children.length > 0) {
          const humanLogic = decodeCondition(cond);
          const xmlStr = new XMLSerializer().serializeToString(cond);
          div.innerHTML += `<div class="meta-block" style="border-left-color:var(--warning)">
            <div style="font-weight:600;color:var(--muted);margin-bottom:4px">Condition:</div>
            <div class="logic-box">${humanLogic}</div>
            <details class="sub-detail"><summary class="sub-summary">Raw Condition XML</summary><pre class="code-block">${escapeHtml(prettyXml(xmlStr))}</pre></details>
          </div>`;
        }
 
        renderStepInternals(child, div);
        
        container.appendChild(div);
      }
    }
  });
}
 
function renderStepInternals(node, container) {
  const type = node.getAttribute("type") || "";
  
  // 1. APP INSTALL SUMMARY
  if (type === "SMS_TaskSequence_InstallApplicationAction") {
    const vars = Array.from(node.querySelectorAll("defaultVarList variable"));
    const apps = [];
    let retries = "0";
 
    vars.forEach(v => {
      const p = v.getAttribute("property");
      // Find display names (AppInfo0DisplayName, AppInfo1DisplayName...)
      if (p && p.match(/AppInfo\d+DisplayName/)) {
        apps.push(v.textContent);
      }
      if (p === "RetryCount") {
        retries = v.textContent;
      }
    });
 
    if (apps.length > 0) {
      let appHtml = `<div class="app-list"><div style="color:#fff;font-weight:bold;margin-bottom:6px;font-size:12px">Applications to Install (Retries: ${retries})</div>`;
      apps.forEach(a => {
        appHtml += `<div class="app-item"><span class="app-icon">📦</span> ${escapeHtml(a)}</div>`;
      });
      appHtml += "</div>";
      container.innerHTML += appHtml;
    }
  }
 
  // 2. Action / Command Line
  const action = node.querySelector("action");
  if (action && action.textContent.trim()) {
    const det = document.createElement("details");
    det.className = "sub-detail";
    det.open = true;
    det.innerHTML = `<summary class="sub-summary">Command / Action</summary><pre class="code-block">${escapeHtml(action.textContent.trim())}</pre>`;
    container.appendChild(det);
  }
 
  // 3. Variables
  const defaults = node.querySelectorAll("defaultVarList variable");
  if (defaults.length > 0) {
    const table = document.createElement("table");
    table.className = "prop-table";
    
    const appFilter = /^(AppInfo(\d+(Description|Name|DisplayName)?)?|ApplicationName)$/;
    
    let hasRows = false;
    defaults.forEach(v => {
      const name = v.getAttribute("property") || v.getAttribute("name");
      let val = v.textContent || "";
      // Hide raw app info vars if we showed the summary
      if (!val || (type === "SMS_TaskSequence_InstallApplicationAction" && appFilter.test(name))) return;
 
      hasRows = true;
      const row = document.createElement("tr");
      
      const isCmd = name === "CommandLine";
      const isB64 = isBase64(val);
 
      if (isB64 || isCmd) {
        const decoded = isB64 ? tryDecodeBase64Text(val) : val;
        row.innerHTML = `<td colspan="2" style="padding:0">
          <details class="sub-detail" style="margin:4px 0"><summary class="sub-summary">${escapeHtml(name)}</summary><pre class="code-block">${escapeHtml(decoded)}</pre></details>
        </td>`;
      } else {
        row.innerHTML = `<td class="prop-key">${escapeHtml(name)}</td><td class="prop-val">${escapeHtml(val)}</td>`;
      }
      table.appendChild(row);
    });
 
    if (hasRows) {
      const det = document.createElement("details");
      det.className = "sub-detail";
      det.open = true;
      det.innerHTML = '<summary class="sub-summary">Variables & Properties</summary>';
      det.appendChild(table);
      container.appendChild(det);
    }
  }
}
 
// --- SCROLLING ---
function scrollToDoc(uid) {
  const target = byId("node-" + uid);
  if (target) {
    let parent = target.parentElement.closest("details.ts-group");
    while(parent) {
      parent.open = true;
      parent = parent.parentElement.closest("details.ts-group");
    }
    
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    if(target.classList.contains('ts-step')) {
      target.style.borderColor = 'var(--accent)';
      target.style.background = 'rgba(96,165,250,0.05)';
      setTimeout(() => {
        target.style.borderColor = '';
        target.style.background = '';
      }, 1500);
    }
  }
}
 
// --- INIT ---
function handleText(text) {
  const xmlStr = findSequenceXmlFromText(text);
  if (!xmlStr) return alert("No <sequence> found in file.");
  const xml = parseSequenceXml(xmlStr);
  if (!xml) return alert("Invalid XML format.");
 
  globalNodeCounter = 0;
  const nav = byId("navTree");
  const doc = byId("docBody");
  nav.innerHTML = "";
  doc.innerHTML = "";
 
  const title = document.createElement("h2");
  title.innerText = (xml.getAttribute("name") || "Task Sequence") + " Documentation";
  title.style.borderBottom = "1px solid var(--border)";
  title.style.paddingBottom = "10px";
  title.style.color = "#fff";
  doc.appendChild(title);
 
  renderNodes(xml, nav, 'nav');
  renderNodes(xml, doc, 'doc');
}
 
// --- EVENTS ---
byId("q").addEventListener("input", e => {
  const term = e.target.value.toLowerCase();
  
  // Filter left menu logic
  // Reset visibility first
  const allDetails = document.querySelectorAll(".panel-left details");
  const allSteps = document.querySelectorAll(".panel-left .ts-step");
  
  allDetails.forEach(d => d.style.display = term ? "none" : "block");
  allSteps.forEach(s => s.style.display = term ? "none" : "flex");
 
  if (!term) return;
 
  // Show matches
  allSteps.forEach(step => {
    if(step.textContent.toLowerCase().includes(term)) {
      step.style.display = "flex";
      // Walk up
      let p = step.parentElement.closest("details");
      while(p) {
        p.style.display = "block";
        p.open = true;
        p = p.parentElement.closest("details");
      }
    }
  });
  
  allDetails.forEach(group => {
    const sum = group.querySelector("summary");
    if(sum && sum.textContent.toLowerCase().includes(term)) {
      group.style.display = "block";
      group.open = true;
      let p = group.parentElement.closest("details");
      while(p) {
        p.style.display = "block";
        p.open = true;
        p = p.parentElement.closest("details");
      }
    }
  });
});
 
byId("expandAll").onclick = () => document.querySelectorAll(".panel-right details").forEach(d => d.open = true);
byId("collapseAll").onclick = () => document.querySelectorAll(".panel-right > details").forEach(d => d.open = false);
 
byId("hideDisabledToggle").addEventListener("change", e => {
  if (e.target.checked) document.body.classList.add("hide-disabled-mode");
  else document.body.classList.remove("hide-disabled-mode");
});
 
byId("copyHtml").addEventListener("click", () => {
  const content = byId("docBody").innerHTML;
  const blob = new Blob([content], {type: "text/html"});
  const item = new ClipboardItem({"text/html": blob});
  navigator.clipboard.write([item]).then(() => {
    const b = byId("copyHtml");
    b.textContent = "✅ Copied!";
    setTimeout(() => b.textContent = "Copy HTML", 2000);
  }).catch(err => alert("Copy failed: " + err));
});
 
byId("file").addEventListener("change", async e => {
  if (e.target.files[0]) handleText(await e.target.files[0].text());
});
 
const dropZone = document.querySelector(".panel-left");
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.style.background = "rgba(255,255,255,0.05)"; });
dropZone.addEventListener("dragleave", e => { e.preventDefault(); dropZone.style.background = ""; });
dropZone.addEventListener("drop", async e => {
  e.preventDefault(); dropZone.style.background = "";
  if (e.dataTransfer.files[0]) handleText(await e.dataTransfer.files[0].text());
});
 
</script>
</body>
