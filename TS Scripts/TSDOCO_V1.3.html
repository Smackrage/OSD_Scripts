<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Task Sequence Reporter</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--glass:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);--hover:rgba(255,255,255,0.05)}
    html,body{height:100%;margin:0;font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;color:#e6eef6;background:#071226;overflow:hidden;}
    .wrap{max-width:1800px;margin:0 auto;padding:15px;height:100vh;box-sizing:border-box;display:flex;flex-direction:column}

    header{display:flex;gap:15px;align-items:center;padding-bottom:15px;border-bottom:1px solid var(--border);flex-shrink:0}
    h1{font-size:18px;margin:0;color:var(--accent);font-weight:600}
    .controls{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}

    button{background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:6px 12px;border-radius:6px;color:#cfe7ff;cursor:pointer;font-size:12px;transition:0.2s}
    button:hover{background:rgba(255,255,255,0.1);border-color:var(--accent)}
    label.toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;margin-right:10px}
    input[type=checkbox]{accent-color:var(--accent)}

    main{display:grid;grid-template-columns:350px 1fr;gap:20px;flex-grow:1;min-height:0;margin-top:15px}

    .panel-left{display:flex;flex-direction:column;border-right:1px solid var(--border);padding-right:10px;min-height:0}
    .search-box{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:rgba(0,0,0,0.2);color:#fff;margin-bottom:10px;box-sizing:border-box;flex-shrink:0}

    .nav-tree{overflow-y:auto;flex-grow:1;padding-bottom:20px}
    .panel-right{overflow-y:auto;padding-right:5px;scroll-behavior:smooth;position:relative}

    ::-webkit-scrollbar {width: 8px; height: 8px;}
    ::-webkit-scrollbar-track {background: rgba(0,0,0,0.1);}
    ::-webkit-scrollbar-thumb {background: rgba(255,255,255,0.15); border-radius: 4px;}
    ::-webkit-scrollbar-thumb:hover {background: rgba(255,255,255,0.25);}

    details.ts-group { margin: 4px 0; }

    summary.group-summary {
      list-style: none; cursor: pointer; user-select: none;
      padding: 6px 8px; border-radius: 6px;
      font-size: 13px; font-weight: 600; color: #e6eef6;
      display: flex; align-items: center;
      transition: background 0.15s;
    }
    summary.group-summary:hover { background: var(--hover); }
    summary.group-summary::-webkit-details-marker { display: none; }

    summary.group-summary::before {
      content: '▶'; display: inline-block; width: 14px;
      margin-right: 6px; font-size: 10px; color: var(--accent);
      transition: transform 0.15s ease; opacity: 0.8;
    }
    details[open] > summary.group-summary::before { transform: rotate(90deg); }

    .group-content {
      padding-left: 10px; margin-left: 7px;
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    .ts-step {
      padding: 5px 8px; margin: 2px 0; border-radius: 4px;
      font-size: 13px; color: #a0aec0; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
    }
    .ts-step:hover { background: var(--hover); color: #fff; }
    .ts-step.active { background: rgba(96,165,250,0.15); color: var(--accent); font-weight: 500; }

    .panel-right details.ts-group {
      border: 1px solid var(--border); border-radius: 8px;
      background: rgba(255,255,255,0.01); margin-bottom: 15px;
    }
    .panel-right summary.group-summary {
      background: rgba(255,255,255,0.02); border-bottom: 1px solid transparent;
    }
    .panel-right details[open] > summary.group-summary {
      border-bottom-color: var(--border); border-radius: 8px 8px 0 0;
    }
    .panel-right .group-content { border-left: none; padding: 15px; margin: 0; }

    .panel-right .ts-step {
      cursor: default;
      background: rgba(255,255,255,0.015); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 12px; padding: 12px;
      display: block;
    }

    .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .step-title { font-weight: 700; color: #e6eef6; font-size: 14px; }
    .step-type { font-size: 10px; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: var(--muted); text-transform: uppercase; }

    .badges { display:flex; gap:6px; }
    .badge { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
    .badge-disabled { background: rgba(231,76,60,0.2); color: #ff8a80; border: 1px solid rgba(231,76,60,0.3); }
    .badge-continue { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid rgba(241,196,15,0.3); }

    details.sub-detail { margin-top: 6px; }
    summary.sub-summary {
      font-size: 11px; color: var(--muted); cursor: pointer; user-select: none;
      padding: 4px 6px; background: rgba(255,255,255,0.03); border-radius: 4px;
      display: inline-flex; align-items: center; outline: none; list-style: none;
    }
    summary.sub-summary:hover { color: #fff; background: rgba(255,255,255,0.06); }
    summary.sub-summary::-webkit-details-marker { display: none; }
    summary.sub-summary::before {
      content: '▶'; display: inline-block; width: 12px; margin-right: 4px;
      font-size: 8px; color: var(--muted); transition: transform 0.15s;
    }
    details[open] > summary.sub-summary::before { transform: rotate(90deg); }

    .meta-block { background: rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; border-left: 2px solid var(--accent); }
    .meta-row { display: flex; gap: 8px; margin-bottom: 4px; }
    .meta-label { color: var(--muted); min-width: 70px; font-weight: 600; }
    .code-block { margin:0; padding:10px; background:#050c18; border-radius:4px; font-family:Menlo,Consolas,monospace; font-size:11px; color:#a5d6ff; white-space:pre-wrap; word-break:break-all; border:1px solid var(--border); }

    .prop-table { width: 100%; font-size: 12px; border-collapse: collapse; margin-top: 5px; }
    .prop-table td { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: top; }
    .prop-key { color: var(--muted); width: 140px; }
    .prop-val { color: #e2e8f0; font-family: Menlo, monospace; }

    .logic-box { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.2); padding: 8px; border-radius: 4px; color: #a0aec0; font-family: Menlo, monospace; font-size: 11px; white-space: pre-wrap; margin-bottom: 5px; }
    .logic-keyword { color: var(--accent); font-weight: bold; }
    .logic-val { color: #2ecc71; }

    .app-list { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin-bottom: 10px; }
    .app-item { display: flex; gap: 10px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    .app-item:last-child { border: none; }

    .is-disabled-node { opacity: 0.6; }
    body.hide-disabled-mode .is-disabled-node { display: none !important; }

    .notes-wrap { margin-top: 10px; }
    .notes-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .notes-label small { font-weight: 500; opacity: 0.9; }
    .notes-text {
      width: 100%;
      box-sizing: border-box;
      min-height: 70px;
      resize: vertical;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
      color: #e6eef6;
      outline: none;
      font-family: Inter,-apple-system,"Segoe UI",Roboto,sans-serif;
      font-size: 12px;
      line-height: 1.35;
    }
    .notes-text:focus { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(96,165,250,0.35); }
    .notes-actions { display:flex; gap:8px; margin-top: 8px; }
    .btn-mini { padding: 5px 10px; font-size: 11px; border-radius: 6px; }
  </style>
</head>

<body class="hide-disabled-mode">
  <div class="wrap">
    <header>
      <h1>Task Sequence Reporter</h1>

      <label class="toggle" title="This only affects the on-screen view. Exports always include disabled steps.">
        <input type="checkbox" id="hideDisabledToggle" checked>
        Hide Disabled Steps
      </label>

      <div class="controls">
        <input id="file" type="file" accept=".xml" style="display:none" />
        <button type="button" onclick="document.getElementById('file').click()">📂 Open XML</button>
        <button type="button" id="collapseAll">Collapse All</button>
        <button type="button" id="expandAll">Expand All</button>
        <button type="button" id="copyHtml">Copy HTML</button>
        <button type="button" id="saveHtml">Save HTML</button>
        <button type="button" id="saveXlsx">Save XLSX</button>
        <button type="button" id="saveCsv">Save CSV</button>
      </div>
    </header>

    <main>
      <div class="panel-left">
        <input id="q" class="search-box" placeholder="Filter navigation..." />
        <div id="navTree" class="nav-tree">
          <div style="padding:20px;text-align:center;color:var(--muted)">Select a Task Sequence XML file to begin.</div>
        </div>
      </div>

      <div class="panel-right" id="docBody"></div>
    </main>
  </div>

<script>
(function(){
"use strict";

var byId = function(id){ return document.getElementById(id); };
var globalNodeCounter = 0;
var rawSequenceXml = null;

var currentSequenceName = "Task Sequence";
var notesStoreKey = "tsr_notes_default";
var notesByUid = {};

function escapeHtml(s) {
  return (s || "").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function prettyXml(xml) {
  var formatted = '';
  var nodes = (xml || "").replace(/>\s*</g, '><').match(/<[^>]+>[^<]*|[^<]+/g) || [];
  var pad = 0;
  nodes.forEach(function(node){
    var indent = 0;
    if (node.match(/^<\/\w/)) pad = Math.max(0, pad - 1);
    else if (node.match(/^<\w[^>]*[^\/]>.*$/)) indent = 1;
    formatted += Array(pad + 1).join('  ') + node + '\n';
    pad += indent;
  });
  return formatted.trim();
}

function safeFileName(name) {
  return (name || "report").replace(/[\\\/:*?"<>|]+/g, "_").replace(/\s+/g," ").trim();
}

function isBase64(str) {
  if (!str || str.length < 20) return false;
  if (str.length % 4 !== 0) return false;
  return /^[A-Za-z0-9+\/]+={0,2}$/.test(String(str).replace(/\s+/g, ""));
}

function tryDecodeBase64Text(str) {
  try {
    var binString = atob(String(str).replace(/\s+/g, ""));
    var bytes = Uint8Array.from(binString, function(c){ return c.charCodeAt(0); });
    if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
      return new TextDecoder('utf-16le').decode(bytes);
    }
    return new TextDecoder('utf-8').decode(bytes);
  } catch (e) { return String(str); }
}

function setNotesKey(seqName) {
  currentSequenceName = seqName || "Task Sequence";
  notesStoreKey = "tsr_notes_" + safeFileName(currentSequenceName).toLowerCase().replace(/\s/g,'_');
}

function loadNotes() {
  try {
    var raw = localStorage.getItem(notesStoreKey);
    notesByUid = raw ? JSON.parse(raw) : {};
  } catch (e) {
    notesByUid = {};
  }
}

function saveNotes() {
  try {
    localStorage.setItem(notesStoreKey, JSON.stringify(notesByUid));
  } catch (e) {
    console.warn("Notes save failed:", e);
  }
}

function getNote(uid) {
  var k = String(uid);
  return (notesByUid && notesByUid[k]) ? notesByUid[k] : "";
}

function setNote(uid, text) {
  notesByUid[String(uid)] = text || "";
  saveNotes();
}

function flushNotesFromUI() {
  var textareas = document.querySelectorAll(".notes-text");
  textareas.forEach(function(ta){
    var card = ta.closest(".ts-step");
    var uid = card && card.dataset ? card.dataset.uid : null;
    if (uid) setNote(uid, ta.value);
  });
}

var OP_MAP = {
  'equals': '==', 'notEquals': '!=', 'greater': '>', 'less': '<', 'greaterEqual': '>=', 'lessEqual': '<=',
  'exists': 'Exists', 'notExists': 'Not Exists'
};

function decodeCondition(node, indent) {
  indent = indent || "";
  var output = "";
  if (!node) return "";

  function processExpr(expr) {
    var type = expr.getAttribute("type") || "";
    var res = "";

    if (type === "SMS_TaskSequence_VariableConditionExpression") {
      var v = expr.querySelector("variable[name='Variable']") ? expr.querySelector("variable[name='Variable']").textContent : "?";
      var opNode = expr.querySelector("variable[name='Operator']");
      var o = OP_MAP[opNode ? opNode.textContent : ""] || "??";
      var val = expr.querySelector("variable[name='Value']") ? expr.querySelector("variable[name='Value']").textContent : "";
      res = "<span class=\"logic-keyword\">VAR</span> " + escapeHtml(v) + " " + o + " <span class=\"logic-val\">\"" + escapeHtml(val) + "\"</span>";
    }
    else if (type === "SMS_TaskSequence_WMIConditionExpression") {
      var ns = expr.querySelector("variable[name='Namespace']") ? expr.querySelector("variable[name='Namespace']").textContent : "root\\cimv2";
      var q = expr.querySelector("variable[name='Query']") ? expr.querySelector("variable[name='Query']").textContent : "";
      res = "<span class=\"logic-keyword\">WMI</span> (" + escapeHtml(ns) + ") <span class=\"logic-val\">\"" + escapeHtml(q) + "\"</span>";
    }
    else if (type === "SMS_TaskSequence_RegistryConditionExpression") {
      var k = expr.querySelector("variable[name='Key']") ? expr.querySelector("variable[name='Key']").textContent : "";
      var vv = expr.querySelector("variable[name='Value']") ? expr.querySelector("variable[name='Value']").textContent : "(Default)";
      var opNode2 = expr.querySelector("variable[name='Operator']");
      var o2 = OP_MAP[opNode2 ? opNode2.textContent : ""] || "??";
      var d = expr.querySelector("variable[name='Data']") ? expr.querySelector("variable[name='Data']").textContent : "";
      res = "<span class=\"logic-keyword\">REG</span> " + escapeHtml(k) + "\\" + escapeHtml(vv) + " " + o2 + " <span class=\"logic-val\">\"" + escapeHtml(d) + "\"</span>";
    }
    else if (type === "SMS_TaskSequence_FolderConditionExpression" || type === "SMS_TaskSequence_FileConditionExpression") {
      var p = expr.querySelector("variable[name='Path']") ? expr.querySelector("variable[name='Path']").textContent : "";
      res = "<span class=\"logic-keyword\">FILE</span> Exists <span class=\"logic-val\">\"" + escapeHtml(p) + "\"</span>";
    }
    else {
      res = "Unknown Expression (" + escapeHtml(type) + ")";
    }
    return res;
  }

  var ops = node.querySelectorAll(":scope > operator");
  if (ops.length === 0) {
    var exprs = node.querySelectorAll(":scope > expression");
    exprs.forEach(function(e){ output += indent + processExpr(e) + "\n"; });
  } else {
    ops.forEach(function(op){
      var type = op.getAttribute("type") || "and";
      var opStr = String(type).toUpperCase();
      var subIndent = indent + "  ";
      var children = [];

      var exprs2 = op.querySelectorAll(":scope > expression");
      exprs2.forEach(function(e){ children.push(processExpr(e)); });

      var subOps = op.querySelectorAll(":scope > operator");
      subOps.forEach(function(s){
        var wrap = document.createElement("condition");
        wrap.appendChild(s.cloneNode(true));
        children.push("(\n" + decodeCondition(wrap, subIndent + "  ") + subIndent + ")");
      });

      if (type === "not") {
        output += indent + "<span class=\"logic-keyword\">NOT</span> (\n" + children.map(function(c){ return subIndent + c; }).join("\n") + "\n" + indent + ")";
      } else {
        output += indent + children.join("\n" + indent + "<span class=\"logic-keyword\">" + opStr + "</span>\n");
      }
    });
  }

  return output;
}

function findSequenceXmlFromText(t) {
  var cdata = String(t || "").match(/<!\[CDATA\[(.*?)\]\]>/s);
  if (cdata && cdata[1] && cdata[1].indexOf("<sequence") >= 0) return cdata[1];
  var seq = String(t || "").match(/<sequence[\s\S]*?<\/sequence>/i);
  return seq ? seq[0] : null;
}

function parseSequenceXml(x) {
  var doc = new DOMParser().parseFromString(x, "application/xml");
  var err = doc.querySelector("parsererror");
  if (err) {
    console.error("XML parse error:", err.textContent);
    alert("XML parse error. Open DevTools (F12) > Console for details.\n\n" + String(err.textContent).slice(0, 500));
    return null;
  }
  return doc.querySelector("sequence");
}

function buildNotesUI(uid) {
  var wrap = document.createElement("div");
  wrap.className = "notes-wrap";

  var label = document.createElement("div");
  label.className = "notes-label";
  label.innerHTML = "<span>Notes</span><small>Saved locally (per task sequence)</small>";

  var ta = document.createElement("textarea");
  ta.className = "notes-text";
  ta.placeholder = "Type notes for this step... (e.g., owner, reason, gotchas, ticket links)";
  ta.value = getNote(uid);

  var tmr = null;
  ta.addEventListener("input", function(){
    clearTimeout(tmr);
    tmr = setTimeout(function(){ setNote(uid, ta.value); }, 250);
  });

  var actions = document.createElement("div");
  actions.className = "notes-actions";

  var clearBtn = document.createElement("button");
  clearBtn.className = "btn-mini";
  clearBtn.textContent = "Clear Notes";
  clearBtn.type = "button";
  clearBtn.onclick = function(){
    ta.value = "";
    setNote(uid, "");
  };

  var copyBtn = document.createElement("button");
  copyBtn.className = "btn-mini";
  copyBtn.textContent = "Copy Notes";
  copyBtn.type = "button";
  copyBtn.onclick = function(){
    navigator.clipboard.writeText(ta.value || "").then(function(){
      copyBtn.textContent = "✅ Copied";
      setTimeout(function(){ copyBtn.textContent = "Copy Notes"; }, 1200);
    }).catch(function(e){
      alert("Copy failed: " + e);
    });
  };

  actions.appendChild(clearBtn);
  actions.appendChild(copyBtn);
  wrap.appendChild(label);
  wrap.appendChild(ta);
  wrap.appendChild(actions);
  return wrap;
}

function renderNodes(node, container, mode) {
  var children = Array.from(node.children).filter(function(n){
    return ['group','step','subtasksequence'].indexOf(n.tagName) >= 0;
  });

  children.forEach(function(child){
    if(!child._uid) child._uid = ++globalNodeCounter;

    var tagName = child.tagName;
    var name = child.getAttribute("name") || "Unnamed";
    var isDisabled = child.getAttribute("disable") === "true";
    var continueErr = child.getAttribute("continueOnError") === "true";
    var isGroup = tagName === 'group';

    var badgeHtml = "";
    if (isDisabled) badgeHtml += "<span class=\"badge badge-disabled\">DISABLED</span>";
    if (continueErr) badgeHtml += "<span class=\"badge badge-continue\">CONTINUE ON ERROR</span>";

    var classes = isGroup ? "ts-group" : "ts-step";
    if(isDisabled) classes += " is-disabled-node";

    if (isGroup) {
      var details = document.createElement("details");
      details.className = classes;
      details.open = true;
      if(mode === 'doc') details.id = "node-" + child._uid;

      var summary = document.createElement("summary");
      summary.className = "group-summary";

      if (mode === 'nav') {
        var warnIcon = continueErr ? "<span style=\"margin-left:auto;opacity:0.7\">⚠️</span>" : "";
        summary.innerHTML = escapeHtml(name) + " " + warnIcon;
        summary.onclick = function(e){ e.preventDefault(); scrollToDoc(child._uid); };
      } else {
        summary.innerHTML = escapeHtml(name) + " <div class=\"badges\" style=\"margin-left:auto\">" + badgeHtml + "</div>";
      }

      var content = document.createElement("div");
      content.className = "group-content";

      if(mode === 'doc') {
        var desc = child.getAttribute("description");
        var cond = child.querySelector("condition");
        var metaHtml = "";
        if(desc) metaHtml += "<div class=\"meta-row\"><span class=\"meta-label\">Desc:</span> <span class=\"meta-val\">" + escapeHtml(desc) + "</span></div>";
        if(cond && cond.children.length > 0) {
          var humanLogic = decodeCondition(cond, "");
          var xmlStr = new XMLSerializer().serializeToString(cond);
          metaHtml += "<div class=\"meta-row\" style=\"flex-direction:column; align-items:flex-start\">"
            + "<span class=\"meta-label\">Condition:</span>"
            + "<div class=\"logic-box\">" + humanLogic + "</div>"
            + "<details class=\"sub-detail\"><summary class=\"sub-summary\">View Raw XML</summary><pre class=\"code-block\">" + escapeHtml(prettyXml(xmlStr)) + "</pre></details>"
            + "</div>";
        }
        if(metaHtml) content.innerHTML += "<div class=\"meta-block\">" + metaHtml + "</div>";
      }

      details.appendChild(summary);
      details.appendChild(content);
      container.appendChild(details);

      renderNodes(child, content, mode);
    } else {
      var div = document.createElement("div");
      div.className = classes;

      if(mode === 'nav') {
        var warnIcon2 = continueErr ? "<span style=\"opacity:0.7;transform:scale(0.8)\">⚠️</span>" : "";
        div.innerHTML = "<span>" + escapeHtml(name) + "</span> " + warnIcon2;
        div.onclick = function(){
          document.querySelectorAll('.panel-left .ts-step').forEach(function(el){ el.classList.remove('active'); });
          div.classList.add('active');
          scrollToDoc(child._uid);
        };
        container.appendChild(div);
      } else {
        div.id = "node-" + child._uid;
        div.dataset.uid = String(child._uid);
        div.dataset.stepName = name;
        div.dataset.stepType = child.getAttribute("type") || tagName;
        div.dataset.disabled = String(isDisabled);
        div.dataset.continueOnError = String(continueErr);

        var type = child.getAttribute("type") || tagName;
        var desc2 = child.getAttribute("description");

        var html = ""
          + "<div class=\"step-header\">"
          + "<span class=\"step-title\">" + escapeHtml(name) + " <span class=\"badges\" style=\"display:inline-flex;vertical-align:middle;margin-left:8px\">" + badgeHtml + "</span></span>"
          + "<span class=\"step-type\">" + escapeHtml(type) + "</span>"
          + "</div>";

        if(desc2) html += "<div class=\"meta-block\" style=\"border-left-color:var(--muted)\"><div class=\"meta-val\">" + escapeHtml(desc2) + "</div></div>";
        div.innerHTML = html;

        var cond2 = child.querySelector("condition");
        if(cond2 && cond2.children.length > 0) {
          var humanLogic2 = decodeCondition(cond2, "");
          var xmlStr2 = new XMLSerializer().serializeToString(cond2);
          div.innerHTML += ""
            + "<div class=\"meta-block\">"
            + "<div style=\"font-weight:600;color:var(--muted);margin-bottom:4px\">Condition:</div>"
            + "<div class=\"logic-box\">" + humanLogic2 + "</div>"
            + "<details class=\"sub-detail\"><summary class=\"sub-summary\">Raw Condition XML</summary><pre class=\"code-block\">" + escapeHtml(prettyXml(xmlStr2)) + "</pre></details>"
            + "</div>";
        }

        renderStepInternals(child, div);

        div.appendChild(buildNotesUI(child._uid));
        container.appendChild(div);
      }
    }
  });
}

function renderStepInternals(node, container) {
  var type = node.getAttribute("type") || "";

  if (type === "SMS_TaskSequence_InstallApplicationAction") {
    var vars = Array.from(node.querySelectorAll("defaultVarList variable"));
    var apps = [];
    var retries = "0";

    vars.forEach(function(v){
      var p = v.getAttribute("property");
      if (p && p.match(/AppInfo\d+DisplayName/)) apps.push(v.textContent);
      if (p === "RetryCount") retries = v.textContent;
    });

    if (apps.length > 0) {
      var appHtml = "<div class=\"app-list\"><div style=\"color:#fff;font-weight:bold;margin-bottom:6px;font-size:12px\">Applications to Install (Retries: " + escapeHtml(retries) + ")</div>";
      apps.forEach(function(a){
        appHtml += "<div class=\"app-item\"><span>📦</span> " + escapeHtml(a) + "</div>";
      });
      appHtml += "</div>";
      container.innerHTML += appHtml;
    }
  }

  var action = node.querySelector("action");
  if (action && action.textContent.trim()) {
    var det = document.createElement("details");
    det.className = "sub-detail";
    det.open = true;
    det.innerHTML = "<summary class=\"sub-summary\">Command / Action</summary><pre class=\"code-block\">" + escapeHtml(action.textContent.trim()) + "</pre>";
    container.appendChild(det);
  }

  var defaults = node.querySelectorAll("defaultVarList variable");
  if (defaults.length > 0) {
    var table = document.createElement("table");
    table.className = "prop-table";

    var appFilter = /^(AppInfo(\d+(Description|Name|DisplayName)?)?|ApplicationName)$/;
    var hasRows = false;

    defaults.forEach(function(v){
      var name = v.getAttribute("property") || v.getAttribute("name");
      var val = v.textContent || "";
      if (!val || (type === "SMS_TaskSequence_InstallApplicationAction" && appFilter.test(name))) return;

      hasRows = true;
      var row = document.createElement("tr");

      var isCmd = name === "CommandLine";
      var isB64 = isBase64(val);

      if (isB64 || isCmd) {
        var decoded = isB64 ? tryDecodeBase64Text(val) : val;
        row.innerHTML = "<td colspan=\"2\" style=\"padding:0\">"
          + "<details class=\"sub-detail\" style=\"margin:4px 0\"><summary class=\"sub-summary\">" + escapeHtml(name) + "</summary><pre class=\"code-block\">" + escapeHtml(decoded) + "</pre></details>"
          + "</td>";
      } else {
        row.innerHTML = "<td class=\"prop-key\">" + escapeHtml(name) + "</td><td class=\"prop-val\">" + escapeHtml(val) + "</td>";
      }
      table.appendChild(row);
    });

    if (hasRows) {
      var det2 = document.createElement("details");
      det2.className = "sub-detail";
      det2.open = true;
      det2.innerHTML = "<summary class=\"sub-summary\">Variables & Properties</summary>";
      det2.appendChild(table);
      container.appendChild(det2);
    }
  }
}

function scrollToDoc(uid) {
  var target = byId("node-" + uid);
  if (target) {
    var parent = target.parentElement.closest("details.ts-group");
    while(parent) {
      parent.open = true;
      parent = parent.parentElement.closest("details.ts-group");
    }
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if(target.classList.contains('ts-step')) {
      target.style.borderColor = 'var(--accent)';
      target.style.background = 'rgba(96,165,250,0.05)';
      setTimeout(function(){ target.style.borderColor = ''; target.style.background = ''; }, 1500);
    }
  }
}

function collectStepsFromXml(seqNode) {
  var steps = [];
  if (!seqNode) return steps;

  function walk(node) {
    var children = Array.from(node.children).filter(function(n){
      return ['group','step','subtasksequence'].indexOf(n.tagName) >= 0;
    });

    children.forEach(function(ch){
      if (!ch._uid) ch._uid = ++globalNodeCounter;

      if (ch.tagName === "group") {
        walk(ch);
      } else {
        var name = ch.getAttribute("name") || "Unnamed";
        var type = ch.getAttribute("type") || ch.tagName;
        var desc = ch.getAttribute("description") || "";
        var disabled = ch.getAttribute("disable") === "true";
        var contErr = ch.getAttribute("continueOnError") === "true";

        steps.push({
          uid: ch._uid,
          name: name,
          type: type,
          description: desc,
          disabled: disabled,
          continueOnError: contErr,
          notes: getNote(String(ch._uid))
        });
      }
    });
  }

  walk(seqNode);
  return steps;
}

function buildExportHtmlFromXml(seqNode) {

  var rows = steps.map(function(s){
    return ""
      + "<tr>"

      + "<td>" + escapeHtml(s.name) + "</td>"

      + "<td>" + (s.continueOnError ? "Yes" : "No") + "</td>"
      + "<td>" + escapeHtml(s.description || "") + "</td>"
      + "<td style=\"white-space:pre-wrap\">" + escapeHtml(s.notes || "") + "</td>"
      + "</tr>";
  }).join("");

  var exported = escapeHtml(new Date().toLocaleString());

  return ""
    + "<!doctype html>\n"
    + "<html lang=\"en\">\n"
    + "<head>\n"
    + "  <meta charset=\"utf-8\" />\n"
    + "  <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\" />\n"
    + "  <title>" + escapeHtml(currentSequenceName) + " Report</title>\n"
    + "  <style>\n"
    + "    body{font-family:Segoe UI,Roboto,Arial,sans-serif;margin:24px;color:#111}\n"
    + "    h1{margin:0 0 12px 0}\n"
    + "    .meta{color:#444;margin-bottom:18px}\n"
    + "    table{border-collapse:collapse;width:100%}\n"
    + "    th,td{border:1px solid #ddd;padding:8px;vertical-align:top;font-size:13px}\n"
    + "    th{background:#f4f6f8;text-align:left}\n"
    + "    .small{font-size:12px;color:#666}\n"
    + "  </style>\n"
    + "</head>\n"
    + "<body>\n"
    + "  <h1>" + escapeHtml(currentSequenceName) + " Report</h1>\n"
    + "  <div class=\"meta\">\n"
    + "    <div><strong>Exported:</strong> " + exported + "</div>\n"
    + "    <div class=\"small\">Disabled steps are always included in exports (even if hidden in the UI).</div>\n"
    + "  </div>\n"
    + "  <table>\n"
    + "    <thead>\n"
    + "      <tr>\n"
    + "        <th>UID</th>\n"
    + "        <th>Step</th>\n"
    + "        <th>Type</th>\n"
    + "        <th>Disabled</th>\n"
    + "        <th>Continue On Error</th>\n"
    + "        <th>Description</th>\n"
    + "        <th>Notes</th>\n"
    + "      </tr>\n"
    + "    </thead>\n"
    + "    <tbody>\n"
    + rows + "\n"
    + "    </tbody>\n"
    + "  </table>\n"
    + "</body>\n"
    + "</html>\n";
}

function downloadText(filename, content, mime) {
  var blob = new Blob([content], { type: mime || "text/plain" });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 0);
}

/* =========================
   XLSX LOADER (LOCAL FIRST)
   ========================= */
function loadScript(url) {
  return new Promise(function(resolve){
    var s = document.createElement("script");
    s.src = url;
    s.onload = function(){ resolve(true); };
    s.onerror = function(){ resolve(false); };
    document.head.appendChild(s);
  });
}

async function ensureXlsxLoaded() {
  if (window.XLSX) return true;

  // 1) Local file first (put xlsx.full.min.js next to this HTML)
  var localOk = await loadScript("./xlsx.full.min.js");
  if (localOk && window.XLSX) return true;

  // 2) CDNs (try several)
  var urls = [
    "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.19.3/xlsx.full.min.js",
    "https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js",
    "https://unpkg.com/xlsx@0.19.3/dist/xlsx.full.min.js"
  ];

  for (var i=0; i<urls.length; i++) {
    var ok = await loadScript(urls[i]);
    if (ok && window.XLSX) return true;
  }
  return false;
}

async function exportXlsx() {
  flushNotesFromUI();
  if (!rawSequenceXml) { alert("Load a Task Sequence XML first."); return; }

  var loaded = await ensureXlsxLoaded();
  if (!loaded) {
    alert(
      "XLSX library could not be loaded.\n\n" +
      "Best fix: place 'xlsx.full.min.js' in the same folder as this HTML.\n" +
      "Then XLSX export works even if CDNs are blocked.\n\n" +
      "For now, use 'Save CSV' (opens in Excel fine)."
    );
    return;
  }

  var steps = collectStepsFromXml(rawSequenceXml);
  var rows = steps.map(function(s){
    return {
      UID: Number(s.uid),
      Step: s.name,
      Type: s.type,
      Disabled: !!s.disabled,
      ContinueOnError: !!s.continueOnError,
      Description: s.description || "",
      Notes: s.notes || ""
    };
  });

  var wb = XLSX.utils.book_new();
  var wsSteps = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, wsSteps, "Steps");

  var total = rows.length;
  var disabledCount = rows.filter(function(r){ return r.Disabled; }).length;
  var contErrCount = rows.filter(function(r){ return r.ContinueOnError; }).length;
  var notesCount = rows.filter(function(r){ return String(r.Notes || "").trim().length > 0; }).length;

  var summary = [
    ["Task Sequence", currentSequenceName],
    ["Exported (local time)", new Date().toLocaleString()],
    ["Total steps", total],
    ["Disabled steps", disabledCount],
    ["Continue on error", contErrCount],
    ["Steps with notes", notesCount],
    ["UI hide-disabled toggle", byId("hideDisabledToggle") && byId("hideDisabledToggle").checked ? "ON (hidden)" : "OFF (shown)"],
    ["Export includes disabled", "Always (by design)"]
  ];
  var wsSummary = XLSX.utils.aoa_to_sheet(summary);
  XLSX.utils.book_append_sheet(wb, wsSummary, "Summary");

  XLSX.writeFile(wb, safeFileName(currentSequenceName) + "_report.xlsx");
}

/* =========================
   CSV EXPORT (NO LIBS)
   ========================= */
function csvEscape(val) {
  var s = String(val == null ? "" : val);
  s = s.replace(/\r\n/g, "\n").replace(/\r/g, "\n");
  if (s.indexOf('"') >= 0) s = s.replace(/"/g, '""');
  if (s.search(/[",\n]/) >= 0) s = '"' + s + '"';
  return s;
}

function exportCsv() {
  flushNotesFromUI();
  if (!rawSequenceXml) { alert("Load a Task Sequence XML first."); return; }

  var steps = collectStepsFromXml(rawSequenceXml);
  var header = ["UID","Step","Type","Disabled","ContinueOnError","Description","Notes"];
  var lines = [header.join(",")];

  steps.forEach(function(s){
    lines.push([
      csvEscape(s.uid),
      csvEscape(s.name),
      csvEscape(s.type),
      csvEscape(s.disabled ? "Yes" : "No"),
      csvEscape(s.continueOnError ? "Yes" : "No"),
      csvEscape(s.description || ""),
      csvEscape(s.notes || "")
    ].join(","));
  });

  var csv = lines.join("\r\n");
  downloadText(safeFileName(currentSequenceName) + "_report.csv", csv, "text/csv");
}

function handleText(text) {
  var xmlStr = findSequenceXmlFromText(text);
  if (!xmlStr) { alert("No <sequence> found in file."); return; }
  var xml = parseSequenceXml(xmlStr);
  if (!xml) return;

  rawSequenceXml = xml;

  globalNodeCounter = 0;
  var nav = byId("navTree");
  var doc = byId("docBody");
  nav.innerHTML = "";
  doc.innerHTML = "";

  var seqName = (xml.getAttribute("name") || "Task Sequence");
  setNotesKey(seqName);
  loadNotes();

  var title = document.createElement("h2");
  title.innerText = seqName + " Documentation";
  title.style.borderBottom = "1px solid var(--border)";
  title.style.paddingBottom = "10px";
  title.style.color = "#fff";
  doc.appendChild(title);

  renderNodes(xml, nav, 'nav');
  renderNodes(xml, doc, 'doc');
}

/* =========================
   EVENTS
   ========================= */
byId("q").addEventListener("input", function(e){
  var term = String(e.target.value || "").toLowerCase();

  var allDetails = document.querySelectorAll(".panel-left details");
  var allSteps = document.querySelectorAll(".panel-left .ts-step");

  allDetails.forEach(function(d){ d.style.display = term ? "none" : "block"; });
  allSteps.forEach(function(s){ s.style.display = term ? "none" : "flex"; });

  if (!term) return;

  allSteps.forEach(function(step){
    if (String(step.textContent || "").toLowerCase().indexOf(term) >= 0) {
      step.style.display = "flex";
      var p = step.parentElement.closest("details");
      while(p) {
        p.style.display = "block";
        p.open = true;
        p = p.parentElement.closest("details");
      }
    }
  });

  allDetails.forEach(function(group){
    var sum = group.querySelector("summary");
    if(sum && String(sum.textContent || "").toLowerCase().indexOf(term) >= 0) {
      group.style.display = "block";
      group.open = true;
      var p = group.parentElement.closest("details");
      while(p) {
        p.style.display = "block";
        p.open = true;
        p = p.parentElement.closest("details");
      }
    }
  });
});

byId("expandAll").onclick = function(){ document.querySelectorAll(".panel-right details").forEach(function(d){ d.open = true; }); };
byId("collapseAll").onclick = function(){ document.querySelectorAll(".panel-right > details").forEach(function(d){ d.open = false; }); };

byId("hideDisabledToggle").addEventListener("change", function(e){
  if (e.target.checked) document.body.classList.add("hide-disabled-mode");
  else document.body.classList.remove("hide-disabled-mode");
});

byId("copyHtml").addEventListener("click", function(){
  var content = byId("docBody").innerHTML;
  var blob = new Blob([content], {type: "text/html"});
  var item = new ClipboardItem({"text/html": blob});
  navigator.clipboard.write([item]).then(function(){
    var b = byId("copyHtml");
    b.textContent = "✅ Copied!";
    setTimeout(function(){ b.textContent = "Copy HTML"; }, 2000);
  }).catch(function(err){ alert("Copy failed: " + err); });
});

byId("saveHtml").addEventListener("click", function(){
  if (!rawSequenceXml) { alert("Load a Task Sequence XML first."); return; }
  var html = buildExportHtmlFromXml(rawSequenceXml);
  downloadText(safeFileName(currentSequenceName) + "_report.html", html, "text/html");
});

byId("saveXlsx").addEventListener("click", function(){ exportXlsx(); });
byId("saveCsv").addEventListener("click", function(){ exportCsv(); });

byId("file").addEventListener("change", function(e){
  var f = e.target.files && e.target.files[0] ? e.target.files[0] : null;
  if (!f) return;
  f.text().then(function(txt){
    handleText(txt);
  }).catch(function(err){
    console.error("File read failed:", err);
    alert("Could not read file: " + err);
  });
});

var dropZone = document.querySelector(".panel-left");
dropZone.addEventListener("dragover", function(e){ e.preventDefault(); dropZone.style.background = "rgba(255,255,255,0.05)"; });
dropZone.addEventListener("dragleave", function(e){ e.preventDefault(); dropZone.style.background = ""; });
dropZone.addEventListener("drop", function(e){
  e.preventDefault(); dropZone.style.background = "";
  var f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0] ? e.dataTransfer.files[0] : null;
  if (!f) return;
  f.text().then(function(txt){
    handleText(txt);
  }).catch(function(err){
    console.error("File read failed:", err);
    alert("Could not read file: " + err);
  });
});

})(); // end IIFE
